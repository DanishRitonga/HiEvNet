global_settings:
  # root_dir: "/home/danishrtg/projects/HiEvNet/hievnet/data/dataset"
  root_dir: "/mnt/data/projects/HiEvNet/hievnet/data/dataset"
  output_image_size: [1024, 1024]
  output_mpp: 0.25
  patching_overlap_pct: 10

  global_cell_map:
    "Background" : 0
    "Other" : 1


datasets:
  CoNSeP:
    root_dir: "CoNSeP"
    ingestion_method: 3 # Instance Matrices
    split_separation: "physical"
    split_dirs:
      train_dir: "Train"
      test_dir: "Test"
    modality_separation: "physical_parallel"
    modality_dirs:
      image_dir: "Images"
      mask_dir: "Labels"
    modality_pairing_rule:
      match_extension: ".mat" # Or .npy / .png depending on exact label format

    namespace_map:
      '1' : Other
      '2' : Inflammatory
      '3' : Epithelial
      '4' : Epithelial
      '5' : fibroblast
      '6' : Muscle
      '7' : Endothelial
    tissue_type: "Colorectal"

  MoNuSAC:
    root_dir: "MoNuSAC/data"
    ingestion_method: 1 # Parquet
    split_separation: "filename_regex"
    split_args:
      regex: "(train|test)"
    modality_separation: "bundled_archive"
    
    namespace_map:
      '0': Other
      '1': Epithelial
      '2': Lymphocyte
      '3': Macrophage
      '4': Neutrophil
    tissue_map:
      '0': Breast
      '1': Kidney
      '2': Lung
      '3': Prostate

  PanNuke:
    root_dir: "PanNuke/data"
    ingestion_method: 1 # Parquet
    split_separation: "filename_regex"
    split_args:
      regex: "(fold[1-3])"
    modality_separation: "bundled_archive"

    namespace_map:
      '0': Neoplastic
      '1': Inflammatory
      '2': Connective
      '3': Dead
      '4': Epithelial
    tissue_map:
      '0': Adrenal Gland
      '1': Bile Duct
      '2': Bladder
      '3': Breast
      '4': Cervix
      '5': Colorectal
      '6': Esophagus
      '7': Head & Neck
      '8': Kidney
      '9': Liver
      '10': Lung
      '11': Ovarian
      '12': Pancreatic
      '13': Prostate
      '14': Skin
      '15': Stomach
      '16': Testis
      '17': Thyroid
      '18': Uterus

  PanopTILs:
    root_dir: "PanopTILs"
    ingestion_method: 5 # CSV Polygons
    split_separation: "physical"
    split_dirs:
      train_dir: "BootstrapNucleiManualRegions_TCGA/tcga"
      val_dir: "ManualNucleiManualRegions"
    modality_separation: "physical_parallel"
    modality_dirs:
      image_dir: "rgbs"
      mask_dir: "csv"
    modality_pairing_rule:
      match_extension: ".csv"
    csv_column_map:
      x_coords: "coords_x" 
      y_coords: "coords_y"
      category: "group"

    tissue_type: "Breast"

  PUMA:
    root_dir: "PUMA"
    ingestion_method: 4 # GeoJSON
    split_separation: "filename_regex"
    split_args:
      regex: "(training_set)" 
    modality_separation: "physical_parallel"
    modality_dirs:
      image_dir: "01_training_dataset_tif_ROIs"
      mask_dir: "01_training_dataset_geojson_nuclei"
    modality_pairing_rule:
      match_extension: ".geojson"
      add_suffix: "_nuclei"

    tissue_type: "Melanoma"